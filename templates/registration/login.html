{% extends "base.html" %}

{% block content %}
<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h2 class="h3 mb-3 text-center">Log In</h2>

            {% if form.errors %}
              <div class="alert alert-danger" role="alert">
                Your username and password didn’t match. Please try again.
              </div>
            {% endif %}

            <form method="post">
              {% csrf_token %}
              {{ form.as_p }}
              <button type="submit" class="btn tickr-btn-accent w-100">Log In</button>
            </form>
            <p class="text-center mt-3 mb-0">
              New here?
              <a href="{% url 'register' %}">Create an account</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock content %}
